name: Bump app_version

# Si attiva quando GitHub Pages termina un deploy (page_build) -> aggiorna
# la riga app_version su Supabase con lo SHA del commit. Realtime notifica
# i client, che mostrano il badge "Update".
on:
  page_build:
  workflow_dispatch:

jobs:
  bump:
    runs-on: ubuntu-latest
    steps:
      - name: Update Supabase app_version
        env:
          MGMT: ${{ secrets.SUPABASE_MGMT_TOKEN }}
          SHA: ${{ github.sha }}
        run: |
          curl -sS -X POST "https://api.supabase.com/v1/projects/yaiarvzrjnxgbtrqjkfz/database/query" \
            -H "Authorization: Bearer $MGMT" \
            -H "Content-Type: application/json" \
            -d "{\"query\":\"update public.app_version set sha='${SHA}', updated_at=now() where id=1;\"}"
